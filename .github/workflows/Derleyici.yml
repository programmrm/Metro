name: CloudStream Compiler
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "**/*.jpg"
      - "**/*.png"

jobs:
  CloudStreamCompiler:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Check out src repository"
        uses: actions/checkout@v6
        with:
          path: "src"

      - name: "Check out build repository"
        uses: actions/checkout@v6
        with:
          ref: "builds"
          path: "builds"

      - name: Clear Old Builds and Folders
        run: |
          cd $GITHUB_WORKSPACE/builds
          rm -rf *.cs3 *.json *.yml README.md 2>/dev/null || true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson --continue || true
          find . -name "*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds/ \;
          # plugins.json farklı gradle versiyonlarında farklı yerde olabilir
          for p in build/plugins.json build/plugin/plugins.json app/build/plugins.json; do
            if [ -f "$p" ]; then
              cp "$p" $GITHUB_WORKSPACE/builds/plugins.json
              break
            fi
          done

      - name: Push Compiled Plugins
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "${{ github.sha }} Derlemesi" || git commit -m "${{ github.sha }} Derlemesi" || true
          git push --force origin builds
