name: CloudStream Compiler
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "**/*.jpg"
      - "**/*.png"

jobs:
  CloudStreamCompiler:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Check out src repository"
        uses: actions/checkout@v6
        with:
          path: "src"

      - name: "Check out build repository"
        uses: actions/checkout@v6
        with:
          ref: "builds"
          path: "builds"

      - name: Clear Old Builds and Folders
        run: |
          cd $GITHUB_WORKSPACE/builds
          rm -rf *.cs3 *.json *.yml README.md 2>/dev/null || true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: false

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make --continue || true
          find . -name "*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds/ \;

      - name: Generate plugins.json
        run: |
          cd $GITHUB_WORKSPACE/builds
          python3 -u -c "
import hashlib, json, os
plugins = [
    {
        'name': 'DiziBox', 'internalName': 'DiziBox', 'version': 23,
        'description': 'DiziBox platformu.',
        'iconUrl': 'https://www.google.com/s2/favicons?domain=www.dizibox.live&sz=%size%',
        'tvTypes': ['TvSeries'], 'language': 'tr',
        'authors': ['programmer'], 'status': 1
    },
    {
        'name': 'Dizilla', 'internalName': 'Dizilla', 'version': 95,
        'description': 'Dizilla platformu.',
        'iconUrl': 'https://www.google.com/s2/favicons?domain=dizillahd.com&sz=%size%',
        'tvTypes': ['TvSeries'], 'language': 'tr',
        'authors': ['programmer'], 'status': 1
    },
    {
        'name': 'DiziPal', 'internalName': 'DiziPal', 'version': 91,
        'description': 'DiziPal platformu.',
        'iconUrl': 'https://www.google.com/s2/favicons?domain=https://dizipal952.com&sz=%size%',
        'tvTypes': ['TvSeries', 'Movie'], 'language': 'tr',
        'authors': ['programmer', 'muratcesmecioglu'], 'status': 1
    },
    {
        'name': 'DiziPalOriginal', 'internalName': 'DiziPalOriginal', 'version': 68,
        'description': 'DiziPalOriginal platformu.',
        'iconUrl': 'https://www.google.com/s2/favicons?domain=https://dizipal2036.com&sz=%size%',
        'tvTypes': ['TvSeries', 'Movie'], 'language': 'tr',
        'authors': ['programmer', 'muratcesmecioglu'], 'status': 1
    }
]
result = []
for p in plugins:
    cs3 = p['internalName'] + '.cs3'
    if not os.path.exists(cs3):
        print('UYARI: ' + cs3 + ' bulunamadi, atlaniyor')
        continue
    with open(cs3, 'rb') as f:
        h = hashlib.sha256(f.read()).hexdigest()
    size = os.path.getsize(cs3)
    entry = {
        'url': 'https://raw.githubusercontent.com/programmrm/Metro/builds/' + cs3,
        'status': p['status'],
        'version': p['version'],
        'name': p['name'],
        'internalName': p['internalName'],
        'authors': p['authors'],
        'description': p['description'],
        'fileSize': size,
        'repositoryUrl': 'https://github.com/programmrm/Metro',
        'language': p['language'],
        'tvTypes': p['tvTypes'],
        'iconUrl': p['iconUrl'],
        'apiVersion': 1,
        'fileHash': 'sha256-' + h
    }
    result.append(entry)
with open('plugins.json', 'w') as f:
    json.dump(result, f, ensure_ascii=False, indent=4)
print('plugins.json olusturuldu')
"

      - name: Push Compiled Plugins
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "${{ github.sha }} Derlemesi" || git commit -m "${{ github.sha }} Derlemesi" || true
          git push --force origin builds
